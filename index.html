<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>시간표 → 캘린더 변환기</title>
  <style>
    :root { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f2f2f7; min-height: 100vh; padding: 20px 16px;
      color: #1c1c1e;
    }
    .wrap { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; margin: 8px 0 4px; }
    .subtitle { font-size: 14px; color: #8e8e93; margin-bottom: 20px; }
    .card {
      background: white; border-radius: 16px; padding: 16px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .card-label { font-size: 13px; color: #8e8e93; margin-bottom: 8px; }
    .upload-area {
      width: 100%; padding: 20px 14px; border: 2px dashed #d1d1d6;
      border-radius: 12px; background: #f9f9fb; cursor: pointer;
      text-align: center; color: #8e8e93; font-size: 15px;
      transition: all 0.2s;
    }
    .upload-area.has-file { border-color: #34c759; color: #34c759; background: #f0fff4; }
    .date-row { display: flex; gap: 10px; }
    .date-group { flex: 1; }
    .date-group label { font-size: 13px; color: #8e8e93; display: block; margin-bottom: 6px; }
    .date-group input[type=date] {
      width: 100%; padding: 10px 12px; border: 1px solid #e5e5ea;
      border-radius: 10px; font-size: 15px; color: #1c1c1e; background: white;
      -webkit-appearance: none;
    }
    .btn-primary {
      width: 100%; padding: 16px; background: #007AFF; color: white;
      border: none; border-radius: 14px; font-size: 17px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .btn-primary:disabled { background: #c7c7cc; cursor: not-allowed; }
    #loading { display: none; text-align: center; padding: 24px 0; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e5e5ea;
      border-top-color: #007AFF; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result { display: none; margin-top: 12px; }
    .result-title { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 14px; }
    .dl-btn {
      display: block; width: 100%; padding: 15px; border-radius: 13px;
      font-size: 16px; font-weight: 600; text-align: center;
      text-decoration: none; margin-bottom: 10px;
    }
    .dl-btn.ios { background: #007AFF; color: white; }
    .dl-btn.other { background: #f2f2f7; color: #007AFF; border: 1.5px solid #007AFF; }
    .dl-note { font-size: 12px; color: #8e8e93; text-align: center; }
    #error-msg { color: #ff3b30; font-size: 14px; text-align: center; padding: 12px 0; display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>시간표 → 캘린더 변환기</h1>
  <p class="subtitle">시간표 사진을 올리면 캘린더(.ics) 파일로 변환해드려요!</p>

  <div class="card">
    <div class="card-label">시간표 사진</div>
    <div class="upload-area" id="area1" onclick="document.getElementById('file1').click()">
      사진 1 선택 (필수)
    </div>
    <input type="file" id="file1" accept="image/*" hidden onchange="fileSelected(1,this)">
    <div class="upload-area" id="area2" onclick="document.getElementById('file2').click()" style="margin-top:10px">
      사진 2 선택 (선택사항)
    </div>
    <input type="file" id="file2" accept="image/*" hidden onchange="fileSelected(2,this)">
  </div>

  <div class="card">
    <div class="date-row">
      <div class="date-group">
        <label>개학일</label>
        <input type="date" id="start-date" value="2026-03-02">
      </div>
      <div class="date-group">
        <label>방학 시작일</label>
        <input type="date" id="end-date" value="2026-07-20">
      </div>
    </div>
  </div>

  <button class="btn-primary" id="submit-btn" onclick="submitForm()">변환하기</button>

  <div id="loading">
    <div class="spinner"></div>
    <p style="color:#8e8e93;font-size:14px;">OCR 인식 중... 30초 정도 걸려요</p>
  </div>

  <div id="error-msg"></div>

  <div class="card" id="result">
    <p class="result-title">변환 완료!</p>
    <a id="ios-link" href="#" class="dl-btn ios">아이폰: 여기서 캘린더에 추가</a>
    <a id="dl-link" href="#" class="dl-btn other" download="시간표.ics">안드로이드 / PC: 파일 다운로드</a>
    <p class="dl-note">아이폰은 반드시 Safari에서 열어주세요</p>
  </div>
</div>

  <script>
    var HF = "https://doy835277-timetable-converter.hf.space";

    function fileSelected(n, input) {
      var area = document.getElementById('area' + n);
      if (input.files[0]) {
        area.textContent = '✓ ' + input.files[0].name;
        area.classList.add('has-file');
      }
    }

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function uploadFile(file) {
      var fd = new FormData();
      fd.append('files', file, file.name);
      return fetch(HF + '/gradio_api/upload', { method: 'POST', body: fd })
        .then(function(res) {
          if (!res.ok) throw new Error('업로드 실패(' + res.status + ')');
          return res.json();
        })
        .then(function(data) { return data[0]; });
    }

    function submitForm() {
      var file1 = document.getElementById('file1').files[0];
      if (!file1) { showError('시간표 사진을 선택해주세요!'); return; }
      var file2 = document.getElementById('file2').files[0] || null;
      var startDate = document.getElementById('start-date').value;
      var endDate = document.getElementById('end-date').value;

      document.getElementById('submit-btn').disabled = true;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';

      var sessionHash = Math.random().toString(36).slice(2, 10);

      var uploadPromises = [uploadFile(file1)];
      if (file2) uploadPromises.push(uploadFile(file2));
      else uploadPromises.push(Promise.resolve(null));

      Promise.all(uploadPromises)
        .then(function(refs) {
          var ref1 = refs[0];
          var ref2 = refs[1];

          function makeFileData(path, file) {
            if (!path) return null;
            return { path: path, orig_name: file.name, meta: { _type: 'gradio.FileData' } };
          }

          var payload = {
            data: [
              makeFileData(ref1, file1),
              ref2 ? makeFileData(ref2, file2) : null,
              startDate,
              endDate
            ],
            fn_index: 0,
            session_hash: sessionHash,
            event_data: null
          };

          return fetch(HF + '/gradio_api/queue/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        })
        .then(function(res) {
          if (!res.ok) throw new Error('큐 실패(' + res.status + ')');
          return new Promise(function(resolve, reject) {
            var es = new EventSource(HF + '/gradio_api/queue/data?session_hash=' + sessionHash);
            var timer = setTimeout(function() { es.close(); reject(new Error('시간 초과')); }, 120000);
            es.onmessage = function(e) {
              try {
                var msg = JSON.parse(e.data);
                if (msg.msg === 'process_completed') {
                  clearTimeout(timer); es.close();
                  var out = msg.output && msg.output.data;
                  if (out && out[1]) {
                    var m = out[1].match(/href="(\/calendar\/[^"]+)"/);
                    if (m) {
                      var url = HF + m[1];
                      document.getElementById('ios-link').href = url;
                      document.getElementById('dl-link').href = url;
                      resolve();
                    } else reject(new Error('링크 없음'));
                  } else reject(new Error('결과 없음'));
                } else if (msg.msg === 'error') {
                  clearTimeout(timer); es.close(); reject(new Error('서버 오류'));
                }
              } catch(ex) {}
            };
            es.onerror = function() { clearTimeout(timer); es.close(); reject(new Error('연결 끊김')); };
          });
        })
        .then(function() {
          document.getElementById('result').style.display = 'block';
        })
        .catch(function(err) {
          showError('오류: ' + err.message);
        })
        .finally(function() {
          document.getElementById('submit-btn').disabled = false;
          document.getElementById('loading').style.display = 'none';
        });
    }
  </script>
</body>
</html>
