<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시간표 캘린더 변환기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        p { color: #888; font-size: 14px; margin-bottom: 32px; }
        .upload-area {
            border: 2px dashed #c0b4f0;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            cursor: pointer;
            background: #f9f7ff;
        }
        .upload-area:hover { background: #f0ecff; }
        .upload-icon { font-size: 40px; margin-bottom: 12px; }
        .upload-area label {
            display: block;
            color: #7c6fd4;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
        .upload-area span { font-size: 12px; color: #aaa; }
        input[type="file"] { display: none; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        #file-name { font-size: 13px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>시간표 캘린더 변환기</h1>
        <p>시간표 사진을 업로드하면 캘린더 파일로 변환해드려요</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">🖼️</div>
                <label>사진 선택하기</label>
                <span>여러 장도 가능해요</span>
            </div>
            <input type="file" id="file-input" name="images" accept="image/*" multiple
                onchange="document.getElementById('file-name').innerText = Array.from(this.files).map(f=>f.name).join(', ')">
            <div id="file-name">선택된 파일 없음</div>
            <br>
            <button type="submit"> 캘린더로 변환하기</button>
        </form>
    </div>
</body>
</html>
